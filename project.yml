# ══════════════════════════════════════════════════════════════
# MealSnap - AI Nutrition & Meal Tracking App
# ══════════════════════════════════════════════════════════════

name: MealSnap
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

# ══════════════════════════════════════════════════════════════
# Global Build Settings
# ══════════════════════════════════════════════════════════════

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 9L6N2ZF26B
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: "5.6.0"

# ══════════════════════════════════════════════════════════════
# Target 1: Main App
# ══════════════════════════════════════════════════════════════

targets:
  MealSnap:
    type: application
    platform: iOS
    sources:
      - path: MealSnap/Sources
      - path: MealSnap/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.MealSnap
        INFOPLIST_FILE: MealSnap/Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MealSnap/Sources/App/MealSnap.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: 9L6N2ZF26B
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    dependencies:
      - package: SnapKit
    entitlements:
      path: MealSnap/Sources/App/MealSnap.entitlements
      properties: {}

# ══════════════════════════════════════════════════════════════
# Target 2: Unit Tests
# ══════════════════════════════════════════════════════════════

  MealSnapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MealSnapTests
    settings:
      base:
        INFOPLIST_FILE: MealSnapTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.MealSnapTests
        PRODUCT_NAME: MealSnapTests
        GENERATE_INFOPLIST_FILE: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MealSnap.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MealSnap"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
    dependencies:
      - target: MealSnap

# ══════════════════════════════════════════════════════════════
# Target 3: UI Tests
# ══════════════════════════════════════════════════════════════

  MealSnapUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MealSnapUITests
    settings:
      base:
        INFOPLIST_FILE: MealSnapUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.MealSnapUITests
        PRODUCT_NAME: MealSnapUITests
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
    dependencies:
      - target: MealSnap

# ══════════════════════════════════════════════════════════════
# Schemes
# ══════════════════════════════════════════════════════════════

schemes:
  MealSnap:
    build:
      targets:
        MealSnap: all
        MealSnapTests: [test]
        MealSnapUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MealSnapTests
        - MealSnapUITests
    archive:
      config: Release